name: Compile Check

on:
  workflow_dispatch:

jobs:
  compile-check:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 28.2.13676358

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4.0.1
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: AndroidLibXrayLite/go.mod
        cache-dependency-path: |
          AndroidLibXrayLite/go.sum
          AndroidLibXrayLite/go.mod

    - name: Install NDK
      run: |
        echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
          --channel=0 \
          --install "ndk;${NDK_VERSION}"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
        echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

    - name: Build libv2ray from source
      shell: pwsh
      run: .\scripts\build-libv2ray.ps1

    - name: Compile check
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew :app:assembleFdroidDebug

    - name: Upload debug APKs
      uses: actions/upload-artifact@v7
      if: ${{ success() }}
      with:
        name: fdroid-debug-apk
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/fdroid/debug/*.apk
        if-no-files-found: error
