name: Build signed F-Droid release APK

on:
  workflow_dispatch:

jobs:
  build-fdroid-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4.0.1
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Fetch AndroidLibXrayLite tag
      run: |
        pushd AndroidLibXrayLite
        CURRENT_TAG=$(git describe --tags --abbrev=0)
        echo "Current tag in this repo: $CURRENT_TAG"
        echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV
        popd

    - name: Download libv2ray
      uses: robinraju/release-downloader@v1.13
      with:
        repository: '2dust/AndroidLibXrayLite'
        tag: ${{ env.CURRENT_TAG }}
        fileName: 'libv2ray.aar'
        out-file-path: V2rayNG/app/libs/

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Decode keystore
      run: |
        KEYSTORE_PATH="${{ github.workspace }}/android_keystore.jks"
        printf '%s' '${{ secrets.APP_KEYSTORE_BASE64 }}' | base64 --decode > "$KEYSTORE_PATH"
        echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

    - name: Build signed F-Droid release APKs
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew :app:assembleFdroidRelease \
          -Pandroid.injected.signing.store.file=$ANDROID_KEYSTORE_PATH \
          -Pandroid.injected.signing.store.password=${{ secrets.APP_KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.APP_KEYSTORE_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.APP_KEY_PASSWORD }}

    - name: Verify signed APKs
      run: |
        for apk in ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/fdroid/release/*.apk; do
          "$ANDROID_HOME/build-tools/36.1.0/apksigner" verify --verbose --print-certs "$apk"
        done

    - name: Upload signed F-Droid release APKs
      uses: actions/upload-artifact@v7
      if: ${{ success() }}
      with:
        name: fdroid-release-apk-signed
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/fdroid/release/*.apk
        if-no-files-found: error
